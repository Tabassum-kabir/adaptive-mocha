<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Concept Quiz</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="card">
      <h1>Quick concept check</h1>
      <p class="lede">Pick the label that best fits each example. There is no penalty for getting one wrong.</p>
      <form id="quiz-form">
        <div id="quiz-items"></div>
        <button type="submit" style="margin-top:16px">Finish block</button>
      </form>
      <div id="result" class="toast" hidden></div>
    </main>
    <script src="/static/quiz.js"></script>
  </body>
</html>
